# Second Brain - User Configuration
#
# Copy this file to config/second-brain.yml and fill in your values.
# config/second-brain.yml is gitignored; this template is tracked.
#
# Most fields can be set at onboarding via /second-brain prompt; this file
# documents the schema and lets you edit by hand.

# ============================================================
# Atlassian tenant (Phase 1B — optional until you have Confluence access)
# ============================================================
# Authoritative credentials live in .env. Set enabled: false for vendor-only bootstrap.
atlassian:
  enabled: false
  site_url: https://yourcompany.atlassian.net
  email: your.email@yourcompany.com

# ============================================================
# Default in-scope Confluence spaces
# ============================================================
# Spaces ingested by default and considered for retrieval and alignment in
# every project. Per-project meta.yml can extend this list.
default_in_scope_spaces:
  - key: ARCH
    name: Architecture
    authority: standard
    domain: internal

  - key: SEC
    name: Security
    authority: standard
    domain: internal

  - key: AUDIT
    name: Audit
    authority: standard
    domain: internal

  - key: DATA
    name: Data Modeling
    authority: standard
    domain: internal

  - key: SRE
    name: SRE Runbooks
    authority: recommendation
    domain: internal

  # Add more as needed. Each entry: key, name, authority, domain.
  # Authority values: standard | recommendation | informational
  # Domain values: internal | vendor:{name} | industry:{name}

# ============================================================
# Vendor doc revalidation (TTL)
# ============================================================
# Vendor caches live at raw/workspace-external/{vendor}/{topic}/{slug}.md
# Fetched on demand via /workspace-ingest-vendor-doc (defuddle). See docs/vendor-catalog.md.
vendor_revalidation:
  default_ttl_days: 90

  # Per-vendor overrides (days until revalidate_after)
  per_vendor: {}
    # aws: 60
    # azure: 90
    # gcp: 90
    # snowflake: 30
    # terraform: 60
    # postgres: 90
    # github: 90
    # docker: 90
    # informatica: 90
    # ibm: 90
    # atlassian: 90   # product docs only; Confluence spaces are workspace-confluence/

  hard_max_age_days: 365

# ============================================================
# Vendor sources (public documentation — no Confluence required)
# ============================================================
# Tier A (v1): on-demand URL fetch via defuddle.
# Tier B (v1.x): optional vendor MCPs in the IDE — see docs/vendor-catalog.md.
vendor_sources:
  enabled:
    - aws
    - azure
    - gcp
    - snowflake
    - informatica
    - ibm
    - terraform
    - github
    - docker
    - postgres
  # Egress allowlist hints for tool-guardian / corporate proxy (hostnames only)
  allowlisted_domains:
    - docs.aws.amazon.com
    - learn.microsoft.com
    - cloud.google.com
    - docs.snowflake.com
    - docs.informatica.com
    - ibm.com
    - developer.hashicorp.com
    - docs.github.com
    - docs.docker.com
    - postgresql.org
  # Optional seed URLs to prefetch during setup (user-approved only)
  # seed_topics:
  #   - vendor: aws
  #     topic: s3-encryption
  #     url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/UsingEncryption.html

# ============================================================
# Confluence sync cadence
# ============================================================
confluence_sync:
  default_cadence: weekly  # weekly | daily | manual
  reminder_after_days: 7

# ============================================================
# Alignment defaults
# ============================================================
# Quality tier expected per align command; affects whether failures block
# publish or are advisory.
alignment_defaults:
  align_cite: production       # gating
  align_vendor_truth: production  # gating
  align_closure: production    # gating
  align_conformance: best-effort  # advisory
  align_coverage: best-effort  # advisory

# ============================================================
# Persona
# ============================================================
# Which template populates this user's instance.
# In v1, only "ceo" is fully populated; other personas are stubs in v1.x.
operator_persona: ceo

# ============================================================
# Optional: cost ceiling (advisory)
# ============================================================
# monthly_budget_usd: 50

# ============================================================
# Optional: archive default behavior
# ============================================================
archive:
  exclude_from_default_search: true
  exclude_from_default_reference: true

# ============================================================
# Optional: Jira (v1.x)
# ============================================================

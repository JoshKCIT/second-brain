# Example configuration for Second Brain platform-research-review scoring.
# Copy to config/platform-research-review.yml and adjust locally if needed.

platform_research:
  north_star: >
    A governed documentation compiler that produces stage-gated, source-arbitrated,
    junior-engineer-executable artifact sets with claim-level traceability.

  allowed_write_paths:
    - wiki/platform-research/**
    - reports/platform-research-review/**
    - docs/platform-decision-records/DRAFT-*.md

  protected_paths:
    - raw/**
    - wiki/workspace-standards/**
    - wiki/workspace-recommendations/**
    - PRD.md
    - product-brief.md
    - docs/product/roadmap.md
    - docs/product/architecture-rationale.md
    - AGENTS.md

  scoring_axes:
    - governance
    - closure
    - grounding
    - vendor_truth
    - inspectability
    - maintainability
    - differentiation
    - enterprise_fit
    - human_review_leverage

  decisions:
    adopt:
      min_total_score: 6
      allow_negative_two: false
      requires_low_uncertainty: true
      requires_no_unresolved_authority_conflict: true
    experiment:
      min_total_score: 2
      max_total_score: 5
    reject:
      max_total_score: 0
    monitor:
      applies_to:
        - market_claim

  required_project_docs:
    - AGENTS.md
    - product-brief.md
    - PRD.md
    - docs/product/architecture-rationale.md
    - docs/product/roadmap.md
    - wiki/platform-research/claim-register.md

  implementation_priority:
    backlog_file: wiki/platform-research/implementation-backlog.md
    one_item_per_cycle: true
    require_user_approval_before_canonical_edits: true
    require_rollback_on_rejection: true
    rescoring: after_each_cycle
    factors:
      - stack_lift
      - platform_lift
      - validation_clarity
      - implementability
      - evidence_strength
      - canonical_risk
      - experiment_uncertainty
    weights:
      stack_lift: 3
      platform_lift: 2
      validation_clarity: 2
      implementability: 2
      evidence_strength: 1
      canonical_risk: -2
      experiment_uncertainty: -1
    validation_commands:
      - python -m unittest discover -s tests
      - python scripts/lint-platform-research.py --root .

  gap_review:
    enabled: true
    cadence: monthly
    user_triggered_only: true
    prompt: .github/prompts/platform-research-review/gap-review.prompt.md
    report_template: templates/platform-research/gap-review-report.md
    report_path: reports/platform-research-review/gap-review-{date}.md
    allowed_write_paths:
      - wiki/platform-research/**
      - reports/platform-research-review/**
      - docs/platform-decision-records/DRAFT-*.md
    must_read:
      - wiki/platform-research/rejected-ideas.md
      - wiki/platform-research/open-hypotheses.md
      - wiki/platform-research/implementation-backlog.md
    experiment_adr: docs/platform-decision-records/RC-2026-05-27-003-controlled-gap-research.md
    hypothesis_id: H-2026-05-27-001
